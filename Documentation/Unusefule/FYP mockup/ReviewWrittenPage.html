<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write a Review</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background: url('dashpage.png') no-repeat center center/cover;
            font-family: 'Poppins', sans-serif;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }
        .intro-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .intro-container h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        .intro-container p {
            font-size: 18px;
            max-width: 400px;
            line-height: 1.5;
        }
        .review-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
        }
        .review-box {
            background: linear-gradient(135deg, rgba(12, 157, 190, 0.9), rgba(217, 75, 172, 0.9),rgba(22, 22, 233, 0.9));
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            width: 380px;
            text-align: center;
            color: rgb(0, 0, 0);
        }
        .review-box h2 {
            color: rgb(0, 0, 0);
            margin-bottom: 15px;
            font-weight: bold;
        }
        .review-box input,
        .review-box textarea {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #2f8fa9;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: rgb(0, 0, 0);
        }
        .review-box textarea {
            resize: vertical; /* Allow vertical resizing */
            height: 100px;
        }
        .review-box select {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #2f8fa9;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            background: linear-gradient(135deg, rgba(12, 157, 190, 0.9), rgba(217, 75, 172, 0.9),rgba(22, 22, 233, 0.9));
            color: rgb(0, 0, 0);
        }
        .review-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, rgba(12, 157, 190, 0.9), rgba(217, 75, 172, 0.9),rgba(22, 22, 233, 0.9));
            color: rgb(0, 0, 0);
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .review-box button:hover {
            background: linear-gradient(135deg, #540303, #5a0303);
        }
        .links {
            margin-top: 12px;
        }
        .links a {
            color: #00ff88;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .links a:hover {
            background: linear-gradient(135deg, #4000ff, #fcfcfc);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="intro-container">
            <h1>Write a Review</h1>
            <p>Share your experience and help others make better decisions. Your reviews are valuable and earn you coins!</p>
            <p>Be honest and detailed in your feedback.</p>
        </div>
        <div class="review-container">
            <div class="review-box">
                <h2>Submit Your Review</h2>
                <form>
                    <input type="text" placeholder="Business Name" required>
                    <select required>
                        <option value="" disabled selected>Select Rating</option>
                        <option value="5">5 Stars</option>
                        <option value="4">4 Stars</option>
                        <option value="3">3 Stars</option>
                        <option value="2">2 Stars</option>
                        <option value="1">1 Star</option>
                    </select>
                    <textarea placeholder="Write your review here..." required></textarea>
                    <button type="submit">Submit Review</button>
                </form>
                <div class="links">
                    <p style="color: rgb(0, 0, 0);">Go back to <a href="Dashboard.html">Dashboard</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
