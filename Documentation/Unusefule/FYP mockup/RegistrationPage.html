<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background: url('RegisterPage.png') no-repeat center center/cover;
            font-family: 'Poppins', sans-serif;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }
        .intro-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .intro-container h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        .intro-container p {
            font-size: 18px;
            max-width: 400px;
            line-height: 1.5;
        }
        .registration-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .registration-box {
            background: rgba(1, 89, 109, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            width: 380px;
            text-align: center;
        }
        .registration-box h2 {
            color: #000000;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .registration-box select,
        .registration-box input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #2f8fa9;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        .registration-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #397e95, #085573);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .registration-box button:hover {
            background: linear-gradient(135deg, #540303, #5a0303);
        }
        .links {
            margin-top: 12px;
        }
        .links a {
            color: #004d12;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .links a:hover {
            background: linear-gradient(135deg, #4000ff, #fcfcfc);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="intro-container">
            <h1>Join Our Platform</h1>
            <p>Sign up to experience AI-powered and blockchain-secured reviews. Create your account today and start contributing!</p>
            <p>that you can easily earn coions by review a Business</p>
        </div>
        <div class="registration-container">
            <div class="registration-box">
                <h2>Create Your Account</h2>
                <form>
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required>
                    <input type="password" placeholder="Confirm Password" required>
                    <select required>
                        <option value="" disabled selected>Select Role</option>
                        <option value="admin">Admin</option>
                        <option value="business-owner">Business Owner</option>
                        <option value="customer">Customer</option>
                    </select>
                    <button type="submit">Register</button>
                </form>
                <div class="links">
                    <p style="color: aliceblue;">Already have an account? <a href="LoginPage.html">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
